<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Bucket Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Distribute into range-based buckets, sort each bucket, concatenate.</text>

  <!-- Legend -->
  <rect x="660" y="70" width="220" height="60" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="680" y="94" fill="#333" font-size="11" font-weight="bold">Time: O(n+k) avg</text>
  <text x="680" y="114" fill="#333" font-size="11" font-weight="bold">Space: O(n+k)</text>
  <text x="800" y="94" fill="#e74c3c" font-size="11" font-weight="bold">Worst: O(n&#xB2;)</text>
  <text x="800" y="114" fill="#888" font-size="11">(all in 1 bucket)</text>

  <!-- Input -->
  <text x="30" y="90" fill="#1a1a1a" font-size="15" font-weight="bold">Input:</text>
  <rect x="100" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="121" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="148" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="169" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="217" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="244" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="265" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="292" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="313" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <rect x="340" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="361" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <text x="400" y="91" fill="#888" font-size="11">3 buckets, range 5&#x2013;91</text>

  <!-- Step 1: Distribute -->
  <rect x="20" y="120" width="860" height="200" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="35" y="142" fill="#1565c0" font-size="14" font-weight="bold">Step 1: Distribute into buckets</text>
  <text x="300" y="142" fill="#888" font-size="11">bucket_index = (value - min) / range_per_bucket</text>

  <!-- Bucket 0: 5-33 -->
  <rect x="40" y="160" width="250" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="50" y="178" fill="#1565c0" font-size="12" font-weight="bold">Bucket 0 (5&#x2013;33)</text>
  <rect x="50" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="69" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">15</text>
  <rect x="94" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="113" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">28</text>
  <rect x="138" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="157" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">5</text>
  <text x="190" y="226" fill="#888" font-size="10">3 elements</text>

  <!-- Bucket 1: 34-62 -->
  <rect x="320" y="160" width="250" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="330" y="178" fill="#1565c0" font-size="12" font-weight="bold">Bucket 1 (34&#x2013;62)</text>
  <rect x="330" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="349" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">42</text>
  <text x="380" y="226" fill="#888" font-size="10">1 element</text>

  <!-- Bucket 2: 63-91 -->
  <rect x="600" y="160" width="250" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="610" y="178" fill="#1565c0" font-size="12" font-weight="bold">Bucket 2 (63&#x2013;91)</text>
  <rect x="610" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="629" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">73</text>
  <rect x="654" y="190" width="38" height="26" rx="4" fill="#1565c0"/><text x="673" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">91</text>
  <text x="710" y="226" fill="#888" font-size="10">2 elements</text>

  <text x="35" y="306" fill="#888" font-size="11">Each element goes to exactly one bucket based on its value range. O(n) to distribute all elements.</text>

  <!-- Step 2: Sort each bucket -->
  <rect x="20" y="322" width="860" height="100" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="344" fill="#e65100" font-size="14" font-weight="bold">Step 2: Sort each bucket</text>
  <text x="260" y="344" fill="#888" font-size="11">(insertion sort on each small bucket)</text>

  <!-- Sorted Bucket 0 -->
  <rect x="40" y="360" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="50" y="376" fill="#e65100" font-size="11" font-weight="bold">Bucket 0 sorted:</text>
  <rect x="160" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="177" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <rect x="198" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="215" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">15</text>
  <rect x="236" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="253" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">28</text>

  <!-- Sorted Bucket 1 -->
  <rect x="320" y="360" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="330" y="376" fill="#e65100" font-size="11" font-weight="bold">Bucket 1 sorted:</text>
  <rect x="440" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="457" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">42</text>

  <!-- Sorted Bucket 2 -->
  <rect x="600" y="360" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="610" y="376" fill="#e65100" font-size="11" font-weight="bold">Bucket 2 sorted:</text>
  <rect x="730" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="747" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">73</text>
  <rect x="768" y="366" width="34" height="24" rx="4" fill="#e65100"/><text x="785" y="383" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">91</text>

  <!-- Step 3: Concatenate -->
  <rect x="20" y="436" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="35" y="458" fill="#27ae60" font-size="14" font-weight="bold">Step 3: Concatenate all buckets</text>
  <rect x="100" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="148" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="244" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="265" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="292" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="313" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="340" y="462" width="42" height="28" rx="4" fill="#27ae60"/><text x="361" y="481" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <text x="400" y="481" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; sorted!</text>

  <!-- Key Takeaways -->
  <rect x="20" y="524" width="860" height="112" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="450" y="548" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Key Takeaways</text>
  <text x="40" y="572" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Distribute O(n)</tspan> + <tspan font-weight="bold">sort each bucket</tspan> + <tspan font-weight="bold">concatenate O(n)</tspan> = O(n + k) when data is uniformly distributed.</text>
  <text x="40" y="592" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold" fill="#e74c3c">Worst case O(n&#xB2;):</tspan> if all elements land in one bucket, you&#x2019;re just running insertion sort on the whole array.</text>
  <text x="40" y="612" fill="#333" font-size="12">&#x2022; Works best when data is <tspan font-weight="bold">uniformly distributed</tspan> across a known range &#x2014; each bucket stays small.</text>
</svg>
