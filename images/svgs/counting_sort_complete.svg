<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Counting Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Count occurrences, then place directly. No comparisons needed.</text>

  <!-- Legend -->
  <rect x="660" y="70" width="220" height="60" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="675" y="82" width="14" height="14" rx="3" fill="#3498db"/>
  <text x="695" y="94" fill="#333" font-size="11">Input data</text>
  <rect x="675" y="102" width="14" height="14" rx="3" fill="#27ae60"/>
  <text x="695" y="114" fill="#333" font-size="11">Sorted output</text>
  <text x="790" y="94" fill="#333" font-size="11" font-weight="bold">Time: O(n+k)</text>
  <text x="790" y="114" fill="#333" font-size="11" font-weight="bold">Space: O(k)</text>

  <!-- ===== STEP 1: Input ===== -->
  <text x="30" y="90" fill="#1a1a1a" font-size="15" font-weight="bold">Input:</text>
  <rect x="100" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="121" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">4</text>
  <rect x="148" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="169" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="196" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="217" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">7</text>
  <rect x="244" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="265" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="292" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="313" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">4</text>
  <rect x="340" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="361" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <text x="400" y="91" fill="#888" font-size="11">min=1, max=7, k=7</text>

  <!-- ===== STEP 2: Find range ===== -->
  <rect x="20" y="120" width="860" height="140" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="35" y="142" fill="#2e7d32" font-size="14" font-weight="bold">Step 1: Build count array</text>
  <text x="250" y="142" fill="#888" font-size="11">Create array of size k = (max - min + 1) = 7, initialized to 0</text>

  <!-- Count array labels (indices 1-7, representing values 1-7) -->
  <text x="35" y="172" fill="#555" font-size="11">Value:</text>
  <text x="121" y="172" text-anchor="middle" fill="#555" font-size="11">1</text>
  <text x="169" y="172" text-anchor="middle" fill="#555" font-size="11">2</text>
  <text x="217" y="172" text-anchor="middle" fill="#555" font-size="11">3</text>
  <text x="265" y="172" text-anchor="middle" fill="#555" font-size="11">4</text>
  <text x="313" y="172" text-anchor="middle" fill="#555" font-size="11">5</text>
  <text x="361" y="172" text-anchor="middle" fill="#555" font-size="11">6</text>
  <text x="409" y="172" text-anchor="middle" fill="#555" font-size="11">7</text>

  <!-- Count array after tallying -->
  <text x="35" y="202" fill="#555" font-size="11">Count:</text>
  <rect x="100" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="121" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">1</text>
  <rect x="148" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="169" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">2</text>
  <rect x="196" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="217" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">0</text>
  <rect x="244" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="265" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">2</text>
  <rect x="292" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="313" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">0</text>
  <rect x="340" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="361" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">0</text>
  <rect x="388" y="182" width="42" height="28" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="409" y="201" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">1</text>

  <text x="460" y="198" fill="#e65100" font-size="12" font-weight="bold">&#x2190; one 1, two 2s, zero 3s, two 4s, zero 5s, zero 6s, one 7</text>

  <!-- Tally explanation -->
  <text x="35" y="244" fill="#888" font-size="11">Scan input left to right: 4&#x2192;count[4]++, 2&#x2192;count[2]++, 7&#x2192;count[7]++, 1&#x2192;count[1]++, 4&#x2192;count[4]++, 2&#x2192;count[2]++</text>

  <!-- ===== STEP 3: Place elements ===== -->
  <rect x="20" y="274" width="860" height="160" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="296" fill="#e65100" font-size="14" font-weight="bold">Step 2: Place elements using counts</text>
  <text x="330" y="296" fill="#888" font-size="11">Walk the count array left to right, placing each value count[i] times</text>

  <text x="35" y="324" fill="#555" font-size="12">count[1]=1 &#x2192; place one 1</text>
  <rect x="100" y="330" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="349" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>

  <text x="35" y="370" fill="#555" font-size="12">count[2]=2 &#x2192; place two 2s</text>
  <rect x="100" y="376" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="395" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="148" y="376" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="395" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="196" y="376" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="395" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>

  <text x="35" y="416" fill="#555" font-size="12">count[3]=0 &#x2192; skip, count[4]=2 &#x2192; place two 4s, count[5,6]=0 &#x2192; skip, count[7]=1 &#x2192; place one 7</text>

  <!-- ===== STEP 4: Output ===== -->
  <rect x="20" y="448" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="35" y="472" fill="#27ae60" font-size="14" font-weight="bold">Result:</text>
  <rect x="100" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">1</text>
  <rect x="148" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="196" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">2</text>
  <rect x="244" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="265" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">4</text>
  <rect x="292" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="313" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">4</text>
  <rect x="340" y="458" width="42" height="28" rx="4" fill="#27ae60"/><text x="361" y="477" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">7</text>
  <text x="400" y="477" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; sorted! Zero comparisons.</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="536" width="860" height="130" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Key Takeaways</text>
  <text x="40" y="586" fill="#333" font-size="12">&#x2022; No element-to-element comparisons &#x2014; just count and place. That&#x2019;s how it beats the O(n log n) lower bound.</text>
  <text x="40" y="606" fill="#333" font-size="12">&#x2022; Time is O(n + k): one pass to count (O(n)), one pass to place (O(k)). When k &#x226A; n, this is essentially O(n).</text>
  <text x="40" y="626" fill="#333" font-size="12">&#x2022; Space is O(k) for the count array. If k is huge (e.g., sorting 100 values with max = 1 billion), counting sort wastes memory.</text>
  <text x="40" y="646" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Stable</tspan> &#x2014; equal elements maintain their relative order (important when used as a subroutine in radix sort).</text>
</svg>
